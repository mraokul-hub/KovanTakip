            <!-- FLOATING ACTION BUTTONS (Masaüstü ve Mobilde ekranın sağ altında sabit) -->

                <button onclick="openScanner()" class="fab fab-secondary" title="QR veya Barkod Okut">
                    <img src="Designer.jpg" alt="Tara" style="width: 24px; border-radius: 4px;">
                    <span class="fab-text">Barkod<br>Tara</span>
                </button>
            </div>


            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
            <script>
                const db = firebase.firestore(); const auth = firebase.auth();
                const kovanId = new URLSearchParams(window.location.search).get('id');
                let currentUser = null; let hasatChart = null; let html5QrcodeScanner = null;
                const hircinlikMap = { 1: "Çok Sakin", 2: "Sakin", 3: "Normal", 4: "Hırçın", 5: "Çok Hırçın" };



                if (!kovanId) window.location.href = "kovanlarim.html";
                auth.onAuthStateChanged(user => { if (user) { currentUser = user; yukle(); navigasyonuKur(); } else window.location.href = 'login.html'; });

                async function navigasyonuKur() {
                    try {
                        const snap = await db.collection("kullanicilar").doc(currentUser.uid).collection("sonenKovanlar").get();
                        if (snap.empty) return;
                        let kovanlar = [];
                        snap.forEach(doc => kovanlar.push({ id: doc.id, no: doc.data().no || "" }));
                        kovanlar.sort((a, b) => a.no.localeCompare(b.no, undefined, { numeric: true, sensitivity: 'base' }));
                        const idx = kovanlar.findIndex(k => k.id === kovanId);
                        const btnPrev = document.getElementById('btnPrev');
                        const btnNext = document.getElementById('btnNext');
                        if (idx > 0) {
                            btnPrev.classList.remove('disabled');
                            btnPrev.removeAttribute('disabled');
                            btnPrev.innerHTML = `<i class="fa-solid fa-chevron-left"></i> Önceki (${kovanlar[idx - 1].no})`;
                            btnPrev.addEventListener('click', () => window.location.href = `sonenDetay.html?id=${kovanlar[idx - 1].id}`);
                        }
                        if (idx < kovanlar.length - 1) {
                            btnNext.classList.remove('disabled');
                            btnNext.removeAttribute('disabled');
                            btnNext.innerHTML = `Sonraki (${kovanlar[idx + 1].no}) <i class="fa-solid fa-chevron-right"></i>`;
                            btnNext.addEventListener('click', () => window.location.href = `sonenDetay.html?id=${kovanlar[idx + 1].id}`);
                        }
                    } catch (e) { console.error("Nav hata:", e); }
                }
                function yukle() { db.collection("kullanicilar").doc(currentUser.uid).collection("sonenKovanlar").doc(kovanId).onSnapshot(doc => { if (doc.exists) { renderView(doc.data()); altYukle('bakimKayitlari', 'bakimListesi'); altYukle('hastalikKayitlari', 'hastalikListesi'); altYukle('hasatKayitlari', 'hasatListesi'); } else { document.body.innerHTML = '<div class="alert alert-danger m-5">Kovan bulunamadı.</div>'; } }); }
                function formatDate(iso) { if (!iso) return '-'; const p = iso.split('-'); return p.length === 3 ? `${p[2]}.${p[1]}.${p[0].slice(2)}` : iso; }
                function formatSonme(ts) { if (!ts) return '-'; const part = ts.substring(0, 10); return formatDate(part) + (ts.length > 10 ? ts.substring(10) : ''); }
                function renderView(d) {
                    document.getElementById('pageTitle').innerHTML = `<img src="5.png" width="30" class="me-2"> Kovan: ${d.no}`;
                    const hVal = d.hircinlik || 3;
                    const hText = hircinlikMap[hVal] || "Bilinmiyor";
                    const sonmeMetni = d.sonmeTarihi ? `<div class="col-12 mt-3"><div class="alert alert-danger p-2 mb-0 fw-bold"><i class="fa-solid fa-calendar-xmark me-2"></i>Sönme Tarihi: ${formatSonme(d.sonmeTarihi)}</div></div>` : '';

                    document.getElementById('viewMode').innerHTML = `
            <div class="col-md-6 mb-3 mb-md-0">
                <div class="card card-modern h-100">
                    <div class="card-body">
                        <h6 class="card-title-modern text-primary"><img src="5.png" width="20"> Genel Bilgiler</h6>
                        <div class="row g-2">
                            <div class="col-6"><strong>Tip:</strong> ${d.tip}</div>
                            <div class="col-6"><strong>Irk:</strong> ${d.irk}</div>
                            <div class="col-6"><strong>Çerçeve:</strong> ${d.cerceve}</div>
                            <div class="col-6"><strong>Hırçınlık:</strong> ${hText}</div>
                            <div class="col-6"><strong>Köken:</strong> ${d.koken}</div>
                            <div class="col-6"><strong>Barkod:</strong> ${d.barkod || '-'}</div>
                            ${sonmeMetni}
                            <div class="col-12 mt-2 border-top pt-2 small text-muted" style="border-top-color: var(--bee-border) !important;">
                                ${d.taban ? '<i class="fa-solid fa-check text-success"></i> Delikli Taban' : ''} 
                                ${d.polen ? '<span class="ms-2"><i class="fa-solid fa-check text-success"></i> Polen Tuzaklı</span>' : ''}
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card card-modern h-100" style="border-top-color: var(--bee-honey) !important;">
                    <div class="card-body">
                        <h6 class="card-title-modern text-warning-emphasis"><img src="1.png" width="20"> Ana Arı</h6>
                        <div class="row g-2">
                            <div class="col-6"><strong>Irk:</strong> ${d.ana?.irk || '-'}</div>
                            <div class="col-6"><strong>Renk:</strong> ${d.ana?.renk || '-'}</div>
                            <div class="col-6"><strong>Perf.:</strong> ${d.ana?.perf || '-'}</div>
                            <div class="col-6"><strong>Doğum:</strong> ${formatDate(d.ana?.dogum)}</div>
                        </div>
                    </div>
                </div>
            </div>`;
                }


                function altYukle(col, divId) {
                    const el = document.getElementById(divId);
                    db.collection("kullanicilar").doc(currentUser.uid).collection("kovanlar").doc(kovanId).collection(col).onSnapshot(async snap => {
                        let docs = [];
                        snap.forEach(d => {
                            let dt = d.data(); dt.id = d.id; dt._tarih = dt.tarih; dt._baslik = dt.islem || dt.hastalik || dt.baslik; dt._miktar = dt.miktar; docs.push(dt);
                        });

                        if (docs.length === 0) {
                            try {
                                const skDoc = await db.collection("kullanicilar").doc(currentUser.uid).collection("sonenKovanlar").doc(kovanId).get();
                                if (skDoc.exists && skDoc.data().no) {
                                    let noStr = skDoc.data().no.toString();
                                    if (noStr.length === 1) noStr = "0" + noStr;
                                    let sonmeTarihi = skDoc.data().sonmeTarihi || "9999-12-31";
                                    if (sonmeTarihi.length > 10) sonmeTarihi = sonmeTarihi.substring(0, 10);
                                    let sonmeTarihiTamsayi = sonmeTarihi + " 23:59:59";

                                    const noSnap = await db.collection("kullanicilar").doc(currentUser.uid).collection("kovanlar").doc(noStr).collection(col).get();
                                    if (noSnap.empty && noStr.startsWith("0")) {
                                        const bareNoSnap = await db.collection("kullanicilar").doc(currentUser.uid).collection("kovanlar").doc(noStr.substring(1)).collection(col).get();
                                        bareNoSnap.forEach(d => {
                                            let dt = d.data(); dt.id = d.id; dt._tarih = dt.tarih; dt._baslik = dt.islem || dt.hastalik || dt.baslik; dt._miktar = dt.miktar;
                                            if (dt._tarih <= sonmeTarihiTamsayi) docs.push(dt);
                                        });
                                    } else {
                                        noSnap.forEach(d => {
                                            let dt = d.data(); dt.id = d.id; dt._tarih = dt.tarih; dt._baslik = dt.islem || dt.hastalik || dt.baslik; dt._miktar = dt.miktar;
                                            if (dt._tarih <= sonmeTarihiTamsayi) docs.push(dt);
                                        });
                                    }
                                }
                            } catch (e) { console.error(e); }
                        }

                        el.innerHTML = '';
                        docs.sort((a, b) => b._tarih.localeCompare(a._tarih));
                        if (col === 'hasatKayitlari') guncelleGrafik(docs);
                        docs.forEach(data => {
                            const rowId = `row-${data.id}`;
                            let border = col.includes('hastalik') ? 'danger' : (col.includes('hasat') ? 'success' : 'primary');
                            let imgHtml = data.foto ? `<br><img src="${data.foto}" class="record-img">` : '';
                            let mainInfo = data._baslik || (data._miktar ? data._miktar + ' KG' : 'Kayıt');
                            if (data.ilac) mainInfo += ` (${data.ilac})`;
                            el.insertAdjacentHTML('beforeend', `<div id="${rowId}" class="card card-modern mb-2 p-3 border-start border-4 border-${border}"><div class="view-div d-flex justify-content-between align-items-center"><div><span class="badge bg-secondary me-2">${formatDate(data._tarih)}</span> <strong style="color: var(--bee-text-main); font-size: 1.1em">${mainInfo}</strong></div></div><div class="view-div text-muted small mt-2 px-2" style="border-left: 2px solid #ccc;">${data.not || 'Not eklenmemiş.'}</div><div class="view-div">${imgHtml}</div></div>`);
                        });
                    });
                }
                function guncelleGrafik(docs) { const chartCard = document.getElementById('grafikKarti'); if (!docs.length) { chartCard.style.display = 'none'; return; } chartCard.style.display = 'block'; const curY = new Date().getFullYear(); const past = {}; const curr = {}; docs.forEach(d => { if (!d._miktar) return; const y = parseInt(d._tarih.substring(0, 4)); const val = Number(d._miktar); if (y < curY) { past[y] = (past[y] || 0) + val; } else { curr[d._tarih] = (curr[d._tarih] || 0) + val; } }); const lbl = [], dat = [], bg = [], bd = []; Object.keys(past).sort().forEach(y => { lbl.push(`${y} (Top.)`); dat.push(past[y]); bg.push('rgba(108,117,125,0.6)'); bd.push('grey'); }); Object.keys(curr).sort().forEach(t => { const p = t.split('-'); lbl.push(`${p[2]}.${p[1]}`); dat.push(curr[t]); bg.push('rgba(255, 159, 64, 0.7)'); bd.push('rgba(255, 159, 64, 1)'); }); if (hasatChart) hasatChart.destroy(); const ctx = document.getElementById('balGrafigi').getContext('2d'); const gradient = ctx.createLinearGradient(0, 0, 0, 200); gradient.addColorStop(0, 'rgba(255, 159, 64, 0.9)'); gradient.addColorStop(1, 'rgba(255, 205, 86, 0.2)'); hasatChart = new Chart(ctx, { type: 'bar', data: { labels: lbl, datasets: [{ label: 'Bal (KG)', data: dat, backgroundColor: gradient, borderColor: 'rgba(255, 159, 64, 1)', borderWidth: 1, borderRadius: 4, barThickness: 'flex', maxBarThickness: 40 }] }, options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, grid: { display: false } }, x: { grid: { display: false } } }, plugins: { legend: { display: false } } } }); }
            </script>
    <footer class="footer-signature">
        <p class="mb-1 fw-bold">© 2025 Hakan Yabgu • Arı severler için özenle geliştirildi 🐝</p>
