    <!-- QR TARA MODAL -->
    <div class="modal fade" id="scannerModal" tabindex="-1" aria-hidden="true">

        </a>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const db = firebase.firestore();
        const auth = firebase.auth();

        auth.onAuthStateChanged((user) => {
            if (user) {
                if (user.email === "mremzi@gmail.com") {
                    document.getElementById('adminBtn').classList.remove('d-none');
                    document.getElementById('adminBtnMobile').classList.remove('d-none');
                    document.getElementById('adminBtnMobile').classList.add('d-flex');
                }
            } else {
                // Giriş yapılmamışsa login.html'e yönlendirilebilir veya butonlar gizli kalır
            }
        });

        db.collection("pano").orderBy("eklenmeTarihi", "desc").get().then(snap => {
            const container = document.getElementById('pano-container');
            container.innerHTML = '';
            if (snap.empty) { container.innerHTML = '<div class="alert alert-info border-0 rounded-4 text-center shadow-sm">Henüz yayınlanmış bir duyuru yok.</div>'; return; }

            // En son duyuru zamanını alıp kaydet (oku olarak işaretle)
            const sonDuyuruZamani = snap.docs[0].data().eklenmeTarihi;
            if (sonDuyuruZamani) {
                localStorage.setItem("sonDuyuruGormeZamani", sonDuyuruZamani.toDate().getTime().toString());
            }

            snap.forEach(doc => {
                const d = doc.data();
                const date = d.eklenmeTarihi ? d.eklenmeTarihi.toDate().toLocaleString('tr-TR') : '';
                container.insertAdjacentHTML('beforeend', `
                <div class="card card-modern border-0 border-start border-4 border-info">
                    <div class="card-body">
                        <h5 class="card-title fw-bold card-title-modern mb-2">${d.baslik}</h5>
                        <h6 class="card-subtitle mb-3 text-muted small pb-2 border-bottom"><i class="fa-regular fa-clock me-1"></i> ${date}</h6>
                        <p class="card-text text-secondary lh-lg mb-0" style="white-space: pre-line;">${d.icerik}</p>
                    </div>
                </div>`);
            });
        });

        let html5QrcodeScanner = null;
        let currentUserUid = null;

        auth.onAuthStateChanged(user => {
            if (user) currentUserUid = user.uid;
            else currentUserUid = null;
        });

        function openScanner() {
            if (!currentUserUid) {
                alert("Barkod okutmak için lütfen önce giriş yapın.");
                window.location.href = "login.html";
                return;
            }
            const m = new bootstrap.Modal(document.getElementById('scannerModal'));
            m.show();
            if (!html5QrcodeScanner) {
                html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: { width: 250, height: 250 } }, false);
                html5QrcodeScanner.render(onScanSuccess, () => { });
            }
        }

        function stopScanner() {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.clear().then(_ => { html5QrcodeScanner = null; }).catch(e => console.error(e));
            }
        }

        async function onScanSuccess(txt) {
            if (html5QrcodeScanner) {
                await html5QrcodeScanner.clear();
                html5QrcodeScanner = null;
            }
            document.getElementById('reader').innerHTML = '';
            const r = document.getElementById('scanResult');
            r.innerHTML = `<div class="spinner-border text-primary spinner-border-sm"></div> Aranıyor: <strong>${txt}</strong>`;
            r.classList.remove('d-none');
            try {
                const snap = await db.collection("kullanicilar").doc(currentUserUid).collection("kovanlar").where("barkod", "==", txt).get();
                if (!snap.empty) {
                    const id = snap.docs[0].id;
                    const no = snap.docs[0].data().no;
                    r.innerHTML = `<div class="text-success fw-bold"><i class="fa-solid fa-check"></i> Bulundu! Kovan: ${no}</div>`;
                    setTimeout(() => window.location.href = `detay.html?id=${id}`, 500);
                } else {
                    r.innerHTML = `<div class="text-danger fw-bold">Bulunamadı!</div>`;
                }
            } catch (e) { console.error(e); }
        }

        document.getElementById('scannerModal').addEventListener('hidden.bs.modal', function () {
            stopScanner();
            document.getElementById('scanResult').classList.add('d-none');
        });
    </script>
