<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Duyurular</title>
    <link rel="icon" href="5.jpg" type="image/jpeg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            flex: 1;
        }

        /* İMZA STİLİ - Kovanekle.html ile birebir aynı */
        .footer-signature {
            text-align: center;
            padding: 20px;
            font-size: 0.85rem;
            color: #6c757d;
            border-top: 1px solid #dee2e6;
            margin-top: 40px;
            background: #fff;
        }

        .footer-signature a {
            text-decoration: none;
        }
    </style>
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="kovanlarim.html"><i
                    class="fa-solid fa-layer-group me-2 text-warning"></i>Kovan Takip</a>
            <div class="d-flex align-items-center">
                <a href="kovanlarim.html" class="btn btn-outline-light btn-sm me-2"><i
                        class="fa-solid fa-arrow-left"></i> Kovanlarım</a>
                <a href="admin_pano.html" id="adminBtn" class="btn btn-warning btn-sm d-none"><i
                        class="fa-solid fa-pencil"></i> Yönetim</a>
                <a href="login.html" id="loginBtn" class="btn btn-success btn-sm d-none">Giriş</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <h3 class="mb-4 text-center text-primary fw-bold"><i class="fa-solid fa-bullhorn me-2"></i>Duyurular
                </h3>
                <div id="pano-container">
                    <div class="text-center text-muted py-5">
                        <div class="spinner-border spinner-border-sm text-primary"></div> Yükleniyor...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer-signature">
    <p class="mb-1 fw-bold text-dark">© 2025 Hakan Yabgu • Arı severler için özenle geliştirildi 🐝</p>
    <small class="d-block mb-3 fw-bold text-dark">💡 Fikir ve önerileriniz için: <a href="mailto:yabguhakan2025@gmail.com" style="color: #0d6efd; text-decoration: none;">✉️ yabguhakan2025@gmail.com</a></small>
</footer>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAO7203PN7V8IBxYe0B13iRy0Ahwzm5sXY", authDomain: "kovan-takip-4c054.firebaseapp.com", projectId: "kovan-takip-4c054", storageBucket: "kovan-takip-4c054.appspot.com", messagingSenderId: "783431210365", appId: "1:783431210365:web:5810ec74c9ff3ba8d4a814" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        auth.onAuthStateChanged((user) => {
            if (user) {
                if (user.email === "mremzi@gmail.com") document.getElementById('adminBtn').classList.remove('d-none');
            } else {
                document.getElementById('loginBtn').classList.remove('d-none');
            }
        });

        db.collection("pano").orderBy("eklenmeTarihi", "desc").get().then(snap => {
            const container = document.getElementById('pano-container');
            container.innerHTML = '';
            if (snap.empty) { container.innerHTML = '<div class="alert alert-info text-center shadow-sm">Henüz yayınlanmış bir duyuru yok.</div>'; return; }

            // En son duyuru zamanını alıp kaydet (oku olarak işaretle)
            const sonDuyuruZamani = snap.docs[0].data().eklenmeTarihi;
            if (sonDuyuruZamani) {
                localStorage.setItem("sonDuyuruGormeZamani", sonDuyuruZamani.toDate().getTime().toString());
            }

            snap.forEach(doc => {
                const d = doc.data();
                const date = d.eklenmeTarihi ? d.eklenmeTarihi.toDate().toLocaleString('tr-TR') : '';
                container.insertAdjacentHTML('beforeend', `
                <div class="card mb-3 shadow-sm border-0 border-start border-4 border-info">
                    <div class="card-body">
                        <h5 class="card-title fw-bold text-dark mb-1">${d.baslik}</h5>
                        <h6 class="card-subtitle mb-3 text-muted small border-bottom pb-2"><i class="fa-regular fa-clock me-1"></i> ${date}</h6>
                        <p class="card-text text-secondary" style="white-space: pre-line;">${d.icerik}</p>
                    </div>
                </div>`);
            });
        });
    </script>
</body>

</html>
