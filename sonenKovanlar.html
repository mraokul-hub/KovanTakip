<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Eski Sönen Kovanlar</title>
    <link rel="icon" href="5.jpg" type="image/jpeg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            flex: 1;
        }

        .kovan-card {
            transition: transform 0.2s;
            cursor: pointer;
            border-left: 5px solid #007bff;
        }

        .kovan-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .card-icon {
            width: 30px;
            height: auto;
            margin-right: 10px;
        }

        .btn-pano {
            background: linear-gradient(45deg, #ffc107, #fd7e14);
            color: white !important;
            border: none;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(253, 126, 20, 0.4);
            animation: pulse-gold 2s infinite;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-pano:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(253, 126, 20, 0.6);
        }

        @keyframes pulse-gold {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 193, 7, 0.7);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(255, 193, 7, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(255, 193, 7, 0);
            }
        }

        /* Yeni Duyuru Animasyonları */
        .btn-pano.has-new {
            background: linear-gradient(45deg, #dc3545, #ff4d4d) !important;
            animation: pulse-danger 1.5s infinite !important;
        }

        .btn-pano.has-new i {
            animation: ring 1.5s infinite;
            transform-origin: top center;
        }

        @keyframes pulse-danger {
            0% {
                box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.8);
            }

            70% {
                box-shadow: 0 0 0 15px rgba(220, 53, 69, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(220, 53, 69, 0);
            }
        }

        @keyframes ring {
            0% {
                transform: rotate(0);
            }

            5% {
                transform: rotate(30deg);
            }

            10% {
                transform: rotate(-28deg);
            }

            15% {
                transform: rotate(34deg);
            }

            20% {
                transform: rotate(-32deg);
            }

            25% {
                transform: rotate(30deg);
            }

            30% {
                transform: rotate(-28deg);
            }

            35% {
                transform: rotate(26deg);
            }

            40% {
                transform: rotate(-24deg);
            }

            45% {
                transform: rotate(22deg);
            }

            50% {
                transform: rotate(-20deg);
            }

            55% {
                transform: rotate(18deg);
            }

            60% {
                transform: rotate(-16deg);
            }

            65% {
                transform: rotate(14deg);
            }

            70% {
                transform: rotate(-12deg);
            }

            75% {
                transform: rotate(10deg);
            }

            80% {
                transform: rotate(-8deg);
            }

            85% {
                transform: rotate(6deg);
            }

            90% {
                transform: rotate(-4deg);
            }

            95% {
                transform: rotate(2deg);
            }

            100% {
                transform: rotate(0);
            }
        }

        #reader {
            width: 100%;
        }

        /* İMZA STİLİ */
        .footer-signature {
            text-align: center;
            padding: 20px;
            font-size: 0.85rem;
            color: #6c757d;
            border-top: 1px solid #dee2e6;
            margin-top: 40px;
            background: #fff;
        }

        .footer-signature a {
            text-decoration: none;
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="kovanlarim.html"><i
                    class="fa-solid fa-layer-group me-2 text-warning"></i>Kovan Takip</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                </ul>
                <div class="d-flex align-items-center gap-2">
                    <a href="sonenKovanlar.html" class="btn btn-outline-light btn-sm" title="Eski Sönen Kovanlar">
                        <img src="Sonmus.png" style="height: 20px; vertical-align: text-bottom;" alt="Sönen"> <span
                            class="d-none d-md-inline">Sönen</span>
                    </a>
                    <a href="bosKovanlar.html" class="btn btn-outline-light btn-sm" title="Boş Kovanlar">
                        <img src="Boskovan.png" style="height: 20px; vertical-align: text-bottom;" alt="Boş"> <span
                            class="d-none d-md-inline">Boş</span>
                    </a>
                    <button class="btn btn-outline-light btn-sm" onclick="openScanner()"><img src="Designer.jpg"
                            style="height: 20px; vertical-align: text-bottom;" alt="Tara"> <span
                            class="d-none d-md-inline">Tara</span></button>
                    <a href="pano.html" id="duyuruBtn" class="btn btn-pano btn-sm rounded-pill px-3"><i
                            class="fa-solid fa-bullhorn"></i> <span class="d-none d-md-inline">Duyuru</span></a>
                    <button id="logoutBtn" class="btn btn-danger btn-sm"><i
                            class="fa-solid fa-right-from-bracket"></i></button>
                </div>
            </div>
        </div>
    </nav>

    <div class="modal fade" id="scannerModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title"><img src="Designer.jpg" class="me-2"
                            style="height: 24px; vertical-align: sub; border-radius: 4px;" alt="Tara">Barkod Tara</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        onclick="stopScanner()"></button>
                </div>
                <div class="modal-body p-0">
                    <div id="reader"></div>
                    <div id="scanResult" class="text-center p-3 d-none">
                        <div class="spinner-border text-primary spinner-border-sm"></div> Aranıyor...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="d-flex align-items-center mb-4 mt-2">
            <img src="Sonmus.png" style="height: 32px; margin-right: 12px;" alt="Sönen">
            <h3 class="mb-0 fw-bold text-danger">Eski Sönen Kovanlar</h3>
        </div>
        <div id="kovan-listesi-container" class="row g-4">
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-primary"></div>
            </div>
        </div>
    </div>

    <footer class="footer-signature">
        <p class="mb-1 fw-bold text-dark">© 2025 Hakan Yabgu • Arı severler için özenle geliştirildi 🐝</p>
        <small class="d-block mb-3 fw-bold text-dark">💡 Fikir ve önerileriniz için: <a
                href="mailto:yabguhakan2025@gmail.com" style="color: #0d6efd; text-decoration: none;">✉️
                yabguhakan2025@gmail.com</a></small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAO7203PN7V8IBxYe0B13iRy0Ahwzm5sXY", authDomain: "kovan-takip-4c054.firebaseapp.com", projectId: "kovan-takip-4c054", storageBucket: "kovan-takip-4c054.appspot.com", messagingSenderId: "783431210365", appId: "1:783431210365:web:5810ec74c9ff3ba8d4a814" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore(); const auth = firebase.auth();
        let html5QrcodeScanner = null; let currentUserUid = null;
        const hircinlikSozlugu = { 1: "Çok Sakin", 2: "Sakin", 3: "Normal", 4: "Hırçın", 5: "Çok Hırçın" };
        function formatSonmeTarihi(ts) { if (!ts) return '-'; const part = ts.substring(0, 10); const p = part.split('-'); const tarih = p.length === 3 ? `${p[2]}.${p[1]}.${p[0].slice(2)}` : part; return tarih + (ts.length > 10 ? ts.substring(10) : ''); }

        auth.onAuthStateChanged(user => { if (user) { currentUserUid = user.uid; kovanlariYukle(user.uid); checkYeniDuyuru(); } else window.location.href = 'login.html'; });
        document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut());

        async function checkYeniDuyuru() {
            try {
                const snap = await db.collection("pano").orderBy("eklenmeTarihi", "desc").limit(1).get();
                if (!snap.empty) {
                    const sonDuyuruZamani = snap.docs[0].data().eklenmeTarihi.toDate().getTime();
                    const sonGorulenZaman = localStorage.getItem("sonDuyuruGormeZamani");
                    if (!sonGorulenZaman || sonDuyuruZamani > parseInt(sonGorulenZaman)) {
                        document.getElementById('duyuruBtn').classList.add('has-new');
                    }
                }
            } catch (e) {
                console.error("Duyuru kontrol hatası:", e);
            }
        }

        async function kovanlariYukle(uid) {
            const div = document.getElementById('kovan-listesi-container');
            try {
                const snap = await db.collection("kullanicilar").doc(uid).collection("sonenKovanlar").get();
                div.innerHTML = '';
                if (snap.empty) { div.innerHTML = '<div class="col-12"><div class="alert alert-info">Henüz kovanınız yok.</div></div>'; return; }
                const docs = []; snap.forEach(doc => docs.push({ id: doc.id, data: doc.data() }));
                docs.sort((a, b) => (b.data.sonmeTarihi || '').localeCompare(a.data.sonmeTarihi || ''));
                docs.forEach(({ id: docId, data: d }) => {
                    const hText = hircinlikSozlugu[d.hircinlik || 3] || "Bilinmiyor";
                    div.insertAdjacentHTML('beforeend', `
                <div class="col-md-6 col-lg-4">
                    <div class="card kovan-card h-100 shadow-sm border-danger" onclick="window.location.href='sonenDetay.html?id=${docId}'">
                        <div class="card-header bg-danger text-white d-flex justify-content-between align-items-center pt-3 pb-2 border-bottom-0">
                            <h5 class="mb-0 fw-bold">Kovan: ${d.no || '?'}</h5>
                            <span class="badge bg-light text-dark border">${d.tip || '-'}</span>
                        </div>
                        <div class="card-body pt-0">
                            <div class="small text-muted mb-2">${d.irk || '-'} &bull; ${d.cerceve || 0} Çerçeve &bull; ${hText}</div>
                            <hr class="my-2">
                            <div class="d-flex align-items-center text-danger small justify-content-between">
                                <span><i class="fa-solid fa-calendar-xmark me-1"></i>Sönme Tarihi: <strong>${formatSonmeTarihi(d.sonmeTarihi)}</strong></span>
                            </div>
                        </div>
                    </div>
                </div>`);
                });
            } catch (e) { div.innerHTML = '<div class="alert alert-danger">Hata: ' + e.message + '</div>'; }
        }

        function openScanner() { const m = new bootstrap.Modal(document.getElementById('scannerModal')); m.show(); if (!html5QrcodeScanner) { html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: { width: 250, height: 250 } }, false); html5QrcodeScanner.render(onScanSuccess, () => { }); } }
        function stopScanner() { if (html5QrcodeScanner) { html5QrcodeScanner.clear().then(_ => { html5QrcodeScanner = null; }).catch(e => console.error(e)); } }
        async function onScanSuccess(txt) { if (html5QrcodeScanner) { await html5QrcodeScanner.clear(); html5QrcodeScanner = null; } document.getElementById('reader').innerHTML = ''; const r = document.getElementById('scanResult'); r.innerHTML = `<div class="spinner-border text-primary spinner-border-sm"></div> Aranıyor: <strong>${txt}</strong>`; r.classList.remove('d-none'); try { const snap = await db.collection("kullanicilar").doc(currentUserUid).collection("kovanlar").where("barkod", "==", txt).get(); if (!snap.empty) { const id = snap.docs[0].id; const no = snap.docs[0].data().no; r.innerHTML = `<div class="text-success fw-bold"><i class="fa-solid fa-check"></i> Bulundu! Kovan: ${no}</div>`; setTimeout(() => window.location.href = `detay.html?id=${id}`, 500); } else { r.innerHTML = `<div class="text-danger fw-bold">Bulunamadı!</div>`; } } catch (e) { console.error(e); } }
        document.getElementById('scannerModal').addEventListener('hidden.bs.modal', function () { stopScanner(); document.getElementById('scanResult').classList.add('d-none'); });
    </script>
</body>

</html>
