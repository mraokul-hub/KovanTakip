            margin-top: auto;
            background: var(--bee-card-bg);
        }
        .footer-signature a {
            text-decoration: none;
        }    </style>

                <button class="btn btn-nav-custom theme-toggle-btn" title="Gece/Gündüz Modu">

            </div>



            <!-- Mobil Üst Menü İkonları (Masaüstünde Gizli) -->
            <div class="d-flex d-lg-none align-items-center gap-2">

    <div class="modal fade" id="scannerModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title"><img src="Designer.jpg" class="me-2"
                            style="height: 24px; vertical-align: sub; border-radius: 4px;" alt="Tara">Barkod Tara</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        onclick="stopScanner()"></button>
                </div>
                <div class="modal-body p-0">
                    <div id="reader"></div>
                    <div id="scanResult" class="text-center p-3 d-none">
                        <div class="spinner-border text-primary spinner-border-sm"></div> Aranıyor...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="d-flex align-items-center mb-4 mt-2">
            <img src="Sonmus.png" style="height: 32px; margin-right: 12px;" alt="Sönen">
            <h3 class="mb-0 fw-bold text-danger">Eski Sönen Kovanlar</h3>
        </div>
        <div id="kovan-listesi-container" class="row g-4">
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-primary"></div>
            </div>
        </div>
    </div>

            <img src="Boskovan.png" class="img-icon" alt="Boş">
            <span>Boş Kovanlar</span>
        </a>
        <a href="sonenKovanlar.html" class="bottom-nav-item active">
            <img src="Sonmus.png" class="img-icon" alt="Sönen">
            <span>Sönen</span>
        </a>
        <a href="gorevler.html" class="bottom-nav-item ">
            <i class="fa-solid fa-calendar-check fs-5"></i>
            <span>Görevler</span>
        </a>
        <a href="envanter.html" class="bottom-nav-item ">
            <i class="fa-solid fa-boxes-stacked fs-5"></i>
            <span>Envanter</span>
        </a>
        <a href="pano.html" class="bottom-nav-item ">
            <i class="fa-solid fa-bullhorn fs-5"></i>
            <span>Duyuru</span>
        </a>

    <!-- FLOATING ACTION BUTTONS (Masaüstü ve Mobilde ekranın sağ altında sabit) -->
    <div class="fab-container">
        <button onclick="openScanner()" class="fab fab-secondary" title="QR veya Barkod Okut">
            <img src="Designer.jpg" alt="Tara" style="width: 24px; border-radius: 4px;">
            <span class="fab-text">Barkod<br>Tara</span>
        </button>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const db = firebase.firestore(); const auth = firebase.auth();
        let html5QrcodeScanner = null; let currentUserUid = null;
        const hircinlikSozlugu = { 1: "Çok Sakin", 2: "Sakin", 3: "Normal", 4: "Hırçın", 5: "Çok Hırçın" };
        function formatSonmeTarihi(ts) { if (!ts) return '-'; const part = ts.substring(0, 10); const p = part.split('-'); const tarih = p.length === 3 ? `${p[2]}.${p[1]}.${p[0].slice(2)}` : part; return tarih + (ts.length > 10 ? ts.substring(10) : ''); }

        auth.onAuthStateChanged(user => { if (user) { currentUserUid = user.uid; kovanlariYukle(user.uid); checkYeniDuyuru(); } else window.location.href = 'login.html'; });
        document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut());
        document.getElementById('logoutBtnMobile').addEventListener('click', () => auth.signOut());

        async function checkYeniDuyuru() {
            try {
                const snap = await db.collection("pano").orderBy("eklenmeTarihi", "desc").limit(1).get();
                if (!snap.empty) {
                    const sonDuyuruZamani = snap.docs[0].data().eklenmeTarihi.toDate().getTime();
                    const sonGorulenZaman = localStorage.getItem("sonDuyuruGormeZamani");
                    if (!sonGorulenZaman || sonDuyuruZamani > parseInt(sonGorulenZaman)) {
                        document.getElementById('duyuruBtn').classList.add('has-new');
                    }
                }
            } catch (e) {
                console.error("Duyuru kontrol hatası:", e);
            }
        }

        async function kovanlariYukle(uid) {
            const div = document.getElementById('kovan-listesi-container');
            try {
                const snap = await db.collection("kullanicilar").doc(uid).collection("sonenKovanlar").get();
                div.innerHTML = '';
                if (snap.empty) {
                    div.innerHTML = `
                    <div class="col-12">
                        <div class="empty-state-container text-center py-5">
                            <svg width="100" height="100" viewBox="0 0 100 100" class="mb-3" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="50" cy="50" r="40" fill="#FEE2E2" />
                                <path d="M50 25 L50 60" stroke="#EF4444" stroke-width="6" stroke-linecap="round"/>
                                <circle cx="50" cy="75" r="4" fill="#EF4444"/>
                            </svg>
                            <h5 class="fw-bold text-dark">Kayıt Bulunamadı</h5>
                            <p class="text-muted mb-0">Henüz sönen / arşivlenen bir kovanınız bulunmamaktadır.</p>
                        </div>
                    </div>`;
                    return;
                }
                const docs = []; snap.forEach(doc => docs.push({ id: doc.id, data: doc.data() }));
                docs.sort((a, b) => (b.data.sonmeTarihi || '').localeCompare(a.data.sonmeTarihi || ''));
                docs.forEach(({ id: docId, data: d }) => {
                    const hText = hircinlikSozlugu[d.hircinlik || 3] || "Bilinmiyor";
                    div.insertAdjacentHTML('beforeend', `
                <div class="col-md-6 col-lg-4">
                    <div class="card card-clickable border-danger h-100" onclick="window.location.href='sonenDetay.html?id=${docId}'">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h5 class="fw-bold mb-0 text-danger"><img src="5.png" width="24" class="me-2">Kovan: ${d.no || '?'}</h5>
                                <span class="badge bg-danger rounded-pill px-3 py-2">${d.tip || '-'}</span>
                            </div>
                            <div class="row g-2 mb-3">
                                <div class="col-6">
                                    <div class="p-2 bg-light rounded text-center">
                                        <div class="small text-muted mb-1">Irk</div>
                                        <div class="fw-bold">${d.irk || '-'}</div>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="p-2 bg-light rounded text-center">
                                        <div class="small text-muted mb-1">Çerçeve</div>
                                        <div class="fw-bold">${d.cerceve || 0}</div>
                                    </div>
                                </div>
                                <div class="col-12 mt-2">
                                    <div class="p-2 bg-light rounded text-center">
                                        <div class="small text-muted mb-1">Hırçınlık</div>
                                        <div class="fw-bold">${hText}</div>
                                    </div>
                                </div>
                            </div>
                            <div class="d-flex align-items-center justify-content-between p-2 rounded" style="background-color: var(--bs-danger-bg-subtle);">
                            	<div class="text-danger fw-bold"><i class="fa-solid fa-calendar-xmark me-2"></i>Sönme Tarihi</div>
                                <strong class="text-danger">${formatSonmeTarihi(d.sonmeTarihi)}</strong>
                            </div>
                        </div>
                    </div>
                </div>`);
                });
            } catch (e) { div.innerHTML = '<div class="alert alert-danger">Hata: ' + e.message + '</div>'; }
        }

        function openScanner() { const m = new bootstrap.Modal(document.getElementById('scannerModal')); m.show(); if (!html5QrcodeScanner) { html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: { width: 250, height: 250 } }, false); html5QrcodeScanner.render(onScanSuccess, () => { }); } }
        function stopScanner() { if (html5QrcodeScanner) { html5QrcodeScanner.clear().then(_ => { html5QrcodeScanner = null; }).catch(e => console.error(e)); } }
        async function onScanSuccess(txt) { if (html5QrcodeScanner) { await html5QrcodeScanner.clear(); html5QrcodeScanner = null; } document.getElementById('reader').innerHTML = ''; const r = document.getElementById('scanResult'); r.innerHTML = `<div class="spinner-border text-primary spinner-border-sm"></div> Aranıyor: <strong>${txt}</strong>`; r.classList.remove('d-none'); try { const snap = await db.collection("kullanicilar").doc(currentUserUid).collection("kovanlar").where("barkod", "==", txt).get(); if (!snap.empty) { const id = snap.docs[0].id; const no = snap.docs[0].data().no; r.innerHTML = `<div class="text-success fw-bold"><i class="fa-solid fa-check"></i> Bulundu! Kovan: ${no}</div>`; setTimeout(() => window.location.href = `detay.html?id=${id}`, 500); } else { r.innerHTML = `<div class="text-danger fw-bold">Bulunamadı!</div>`; } } catch (e) { console.error(e); } }
        document.getElementById('scannerModal').addEventListener('hidden.bs.modal', function () { stopScanner(); document.getElementById('scanResult').classList.add('d-none'); });
    </script>
    <footer class="footer-signature">
        <p class="mb-1 fw-bold">© 2025 Hakan Yabgu • Arı severler için özenle geliştirildi 🐝</p>
        <small class="d-block mb-3 fw-bold">💡 Fikir ve önerileriniz için: <a href="mailto:yabguhakan2025@gmail.com">✉️ yabguhakan2025@gmail.com</a></small>
    </footer>
